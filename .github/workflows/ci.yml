name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: build em sincronia (src -> index.html)
        run: node build.mjs --check-deploy
      - name: smoke test
        run: node smoke-test.mjs
