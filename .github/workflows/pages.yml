# O Pages está em modo "Deploy from a branch": o build automático do GitHub ("pages build
# and deployment") publica o site a cada push. Este workflow (modo GitHub Actions) era
# redundante e falhava sempre no deploy-pages (fonte por branch != artifact de Actions),
# deixando um X vermelho em todo deploy. Mantido SÓ como escape manual (workflow_dispatch):
# se o build por branch um dia falhar, dá pra publicar por aqui à mão. Não roda em push.
name: Deploy Pages (manual — fallback)
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
