<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Córtex — centro de comando</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20120%20120'%3E%3Crect%20width='120'%20height='120'%20rx='26'%20fill='%230B0A12'/%3E%3Cg%20fill='none'%20stroke='%238B5CF6'%20stroke-width='6'%3E%3Cpath%20d='M34%2029%2060%2060M20%2060%2060%2060M34%2091%2060%2060M77%2096%2060%2060'/%3E%3C/g%3E%3Cpath%20d='M77%2024%2060%2060'%20fill='none'%20stroke='%23F5A524'%20stroke-width='6'/%3E%3Cg%20fill='%238B5CF6'%3E%3Ccircle%20cx='34'%20cy='29'%20r='8'/%3E%3Ccircle%20cx='20'%20cy='60'%20r='8'/%3E%3Ccircle%20cx='34'%20cy='91'%20r='8'/%3E%3Ccircle%20cx='77'%20cy='96'%20r='8'/%3E%3C/g%3E%3Ccircle%20cx='77'%20cy='24'%20r='8.5'%20fill='%23F5A524'/%3E%3Ccircle%20cx='60'%20cy='60'%20r='12'%20fill='%23B69CFF'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B0A12">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Córtex — neutros com viés violeta; violeta primária + âmbar-sinal (BRAND.md) */
    --bg:#0B0A12;
    --glass:rgba(22,19,31,.74);
    --glass2:rgba(182,156,255,.08);
    --line:rgba(170,150,230,.13);
    --line2:rgba(190,170,255,.24);
    --tx:#ECEAF6; --tx2:#9B93B4; --tx3:#6E6787;
    --ac:#8B5CF6; --ac2:#B69CFF;
    --ok:#3ddc84; --warn:#F5A524; --bad:#ff6b5e; --gold:#FFC46B;
    --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; overflow:hidden}
  body{background:var(--bg); color:var(--tx); font:15px/1.6 'Inter',system-ui,sans-serif}
  ::selection{background:rgba(139,92,246,.35)}
  ::-webkit-scrollbar{width:9px}
  ::-webkit-scrollbar-thumb{background:rgba(182,156,255,.18); border-radius:99px}
  :focus-visible{outline:2px solid var(--ac2); outline-offset:2px}

  /* ===== marca Córtex: tipografia (display Sora · dados em mono) ===== */
  .hud h1, .dr-head h3, .modal h2, .modal h3{font-family:'Sora','Inter',sans-serif; letter-spacing:-.01em}
  .hud .m b{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .hud .m span, .dr-sec, .node .sub{font-family:var(--mono)}

  /* ===== ⚙ Conta & Workspace: header de conta + abas ===== */
  .acc-id{display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--line); border-radius:14px; background:var(--glass2)}
  .acc-id .av{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-weight:800; font-size:16px; background:linear-gradient(135deg,#7C4FF0,#9D6BFF); color:#fff; flex:none}
  .acc-tabs{display:flex; gap:4px; flex-wrap:wrap; border-bottom:1px solid var(--line); margin:16px 0 16px}
  .acc-tab{background:transparent; border:1px solid transparent; border-bottom:none; color:var(--tx3); font-weight:650; font-size:13px; padding:8px 13px; border-radius:10px 10px 0 0; cursor:pointer; font-family:inherit}
  .acc-tab:hover{color:var(--tx)}
  .acc-tab.on{color:var(--tx); background:var(--glass2); border-color:var(--line)}
  .tabpane{display:none}
  .tabpane.on{display:block}

  /* ===== diálogos & toasts do próprio Córtex (adeus popups do navegador) ===== */
  .ui-ov{position:fixed; inset:0; z-index:200; display:grid; place-items:center; padding:20px; background:rgba(4,4,9,.6); backdrop-filter:blur(4px); animation:uiFade .14s ease}
  .ui-dlg{width:min(430px,94vw); background:linear-gradient(180deg,var(--glass),rgba(16,14,26,.97)); border:1px solid var(--line2); border-radius:18px; padding:22px 22px 18px; box-shadow:0 30px 80px rgba(0,0,0,.6); animation:pop .2s cubic-bezier(.2,1.4,.4,1)}
  .ui-dlg h4{font-family:'Sora','Inter',sans-serif; font-size:17px; font-weight:750; margin:0 0 8px}
  .ui-dlg p{color:var(--tx2); font-size:13.5px; line-height:1.55; margin:0}
  .ui-dlg .btns{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; margin-top:20px}
  .btn.danger{background:linear-gradient(135deg,#e0574a,#ff6b5e); border:none; color:#fff}
  .btn.danger:hover{filter:brightness(1.08); color:#fff}
  @keyframes uiFade{from{opacity:0}}
  #uiToasts{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:210; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; width:min(440px,92vw)}
  .ui-toast{pointer-events:auto; max-width:100%; background:rgba(16,14,26,.97); border:1px solid var(--line2); border-left:3px solid var(--ac); border-radius:12px; padding:11px 15px; font-size:13.5px; color:var(--tx); box-shadow:0 14px 40px rgba(0,0,0,.5); animation:toastIn .22s cubic-bezier(.2,1.3,.4,1); white-space:pre-wrap; line-height:1.45}
  .ui-toast.ok{border-left-color:var(--ok)} .ui-toast.warn{border-left-color:var(--warn)} .ui-toast.bad{border-left-color:var(--bad)}
  .ui-toast.out{animation:toastOut .25s ease forwards}
  @keyframes toastIn{from{opacity:0; transform:translateY(12px)}}
  @keyframes toastOut{to{opacity:0; transform:translateY(8px)}}

  /* ===== cards de conectar IA ===== */
  .ai-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
  @media(max-width:640px){.ai-cards{grid-template-columns:1fr}}
  .ai-card{border:1px solid var(--line); border-radius:13px; padding:14px; background:var(--glass2); display:flex; flex-direction:column; gap:8px}
  .ai-card .ai-h{display:flex; align-items:center; gap:8px; font-size:14px}
  .ai-card .ai-ic{width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-size:14px; border:1px solid var(--line2)}
  .ai-card p{color:var(--tx3); font-size:11.5px; margin:0; flex:1; line-height:1.4}
  .ai-card .btn{justify-content:center}

  /* ===== fundo ===== */
  .aurora{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none}
  .blob{position:absolute; border-radius:50%; filter:blur(120px); opacity:.45; animation:drift 30s ease-in-out infinite alternate}
  .b1{width:55vw;height:55vw; background:radial-gradient(circle,#241a4d 0%,transparent 65%); top:-20vw; left:-14vw}
  .b2{width:46vw;height:46vw; background:radial-gradient(circle,#2e2110 0%,transparent 65%); bottom:-18vw; right:-10vw; animation-delay:-9s}
  .b3{width:36vw;height:36vw; background:radial-gradient(circle,#2c1d52 0%,transparent 65%); top:34vh; left:58vw; animation-delay:-18s}
  @keyframes drift{to{transform:translate(6vw,4vh) scale(1.16)}}

  /* ===== canvas ===== */
  #viewport{position:fixed; inset:0; z-index:1; cursor:grab; overflow:hidden; touch-action:none}
  #viewport.panning{cursor:grabbing}
  #world{position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform}
  #gridDots{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.55;
    background-image:radial-gradient(rgba(182,156,255,.07) 1.2px, transparent 1.2px);
  }
  svg#edges{position:absolute; left:0; top:0; width:10px; height:10px; overflow:visible; pointer-events:none}
  .edge{fill:none; stroke-width:2; opacity:.5}
  .edge.dim{opacity:.18}

  /* ===== nós ===== */
  .node{position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; user-select:none; z-index:3; transition:filter .2s}
  .node .orb{
    display:grid; place-items:center; border-radius:50%;
    background:var(--glass); backdrop-filter:blur(14px);
    border:1.5px solid var(--line2);
    box-shadow:0 10px 34px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.14);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s;
    position:relative;
  }
  .node:hover .orb{transform:scale(1.07)}
  .node.sel .orb{border-color:#fff}
  .node.co .orb{width:104px;height:104px; font-size:44px}
  .node.pj .orb{width:80px;height:80px; font-size:32px}
  .node.ap .orb{width:62px;height:62px; font-size:15px; font-weight:750; color:#fff}
  .node .halo{position:absolute; inset:-14px; border-radius:50%; filter:blur(22px); opacity:.4; z-index:-1; pointer-events:none}
  .node .tag{
    max-width:170px; text-align:center; font-size:13px; font-weight:650; line-height:1.3;
    background:rgba(8,11,17,.72); backdrop-filter:blur(8px); border:1px solid var(--line);
    padding:4px 12px; border-radius:99px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .node.ap .tag{font-size:12px; font-weight:550; color:var(--tx2)}
  .node .sub{font-size:10.5px; color:var(--tx3); margin-top:-4px; letter-spacing:.6px; text-transform:uppercase; font-weight:600}
  .expand-dot{
    position:absolute; bottom:2px; right:2px; width:22px; height:22px; border-radius:50%;
    background:linear-gradient(135deg,#7C4FF0,#9D6BFF); color:#fff; display:grid; place-items:center;
    font-size:13px; font-weight:800; border:2px solid #0b0e15;
  }
  .sdot{position:absolute; top:4px; right:4px; width:12px;height:12px;border-radius:50%; border:2px solid #0b0e15}
  .sdot.ok{background:var(--ok); box-shadow:0 0 8px var(--ok)}
  .sdot.bad{background:var(--bad); box-shadow:0 0 8px var(--bad)}
  .sdot.load{background:var(--warn); animation:pulse 1s infinite}
  .sdot.alert{background:var(--warn); box-shadow:0 0 8px var(--warn)}
  @keyframes pulse{50%{opacity:.3}}
  .node.enter{animation:nodePop .3s cubic-bezier(.2,1.5,.4,1)}
  @keyframes nodePop{from{opacity:0; transform:translate(-50%,-50%) scale(.4)} to{opacity:1; transform:translate(-50%,-50%) scale(1)}}

  /* ===== HUD topo ===== */
  .hud{
    position:fixed; top:18px; left:18px; z-index:10; display:flex; align-items:center; gap:14px;
    background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--line);
    border-radius:16px; padding:12px 18px; box-shadow:0 10px 34px rgba(0,0,0,.4);
  }
  .hud .cube{width:36px;height:36px; border-radius:11px; display:grid; place-items:center}
  .hud h1{font-size:16.5px; font-weight:750; line-height:1.1}
  .hud small{color:var(--tx3); font-size:10.5px; letter-spacing:1.6px; text-transform:uppercase; font-weight:600}
  .hud .sep{width:1px; height:30px; background:var(--line)}
  .hud .m{text-align:center; padding:0 4px}
  .hud .m b{display:block; font-size:15.5px; font-weight:750}
  .hud .m span{font-size:9.5px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; font-weight:600}

  .btn{
    background:var(--glass2); color:var(--tx); border:1px solid var(--line);
    border-radius:11px; padding:8px 15px; cursor:pointer; font-size:13px;
    font-family:inherit; font-weight:600; transition:.16s;
  }
  .btn:hover{border-color:var(--ac); color:var(--ac2)}
  .btn.primary{background:linear-gradient(135deg,#7C4FF0,#9D6BFF); border:none; color:#fff; box-shadow:0 4px 16px rgba(139,92,246,.4)}
  .btn.primary:hover{filter:brightness(1.12); color:#fff}
  .btn.ghost{background:transparent; border-color:transparent; color:var(--tx3)}
  .btn.ghost:hover{color:var(--bad)}
  .btn.sm{padding:5px 11px; font-size:12px; border-radius:9px}

  .topright{position:fixed; top:18px; right:18px; z-index:10; display:flex; gap:9px}

  /* ===== controles zoom ===== */
  .zoomctl{
    position:fixed; bottom:20px; left:18px; z-index:10; display:flex; align-items:center; gap:4px;
    background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--line);
    border-radius:13px; padding:6px; box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .zoomctl button{background:transparent; border:none; color:var(--tx2); width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:17px; font-family:inherit}
  .zoomctl button:hover{background:var(--glass2); color:var(--tx)}
  .zoomctl .pct{font-size:12px; color:var(--tx3); min-width:44px; text-align:center; font-family:'JetBrains Mono',monospace}
  .helper{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:9;
    color:var(--tx3); font-size:12px; letter-spacing:.4px; pointer-events:none;
    background:rgba(8,11,17,.55); padding:6px 16px; border-radius:99px; backdrop-filter:blur(8px);
  }
  .mapfilter{ position:fixed; top:88px; left:18px; z-index:9; display:flex; gap:6px; flex-wrap:wrap; max-width:min(70vw,520px); }
  .mapfilter .fc{ background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--line); color:var(--tx2); font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:99px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:5px; }
  .mapfilter .fc:hover{ border-color:var(--ac); color:var(--tx); }
  .mapfilter .fc.on{ background:linear-gradient(135deg,#7C4FF0,#9D6BFF); border-color:transparent; color:#fff; box-shadow:0 6px 18px rgba(124,79,240,.35); }
  .mapfilter .fc .n{ opacity:.72; font-weight:700; }
  .node.dimmed{ opacity:.15; filter:grayscale(.7); pointer-events:none; }

  /* ===== drawer ===== */
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:400px; max-width:94vw; z-index:20;
    background:rgba(13,17,26,.88); backdrop-filter:blur(28px);
    border-left:1px solid var(--line2); box-shadow:-30px 0 70px rgba(0,0,0,.5);
    transform:translateX(105%); transition:transform .28s cubic-bezier(.2,.9,.3,1);
    display:flex; flex-direction:column;
  }
  .drawer.open{transform:none}
  .dr-head{padding:22px 24px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px}
  .dr-emoji{width:52px;height:52px; border-radius:15px; display:grid; place-items:center; font-size:25px; background:var(--glass2); border:1px solid var(--line2); flex:none}
  .dr-head h3{font-size:18px; font-weight:750; line-height:1.25}
  .dr-head .k{font-size:11px; color:var(--tx3); text-transform:uppercase; letter-spacing:1.4px; font-weight:650}
  .dr-close{margin-left:auto; background:transparent; border:none; color:var(--tx3); font-size:20px; cursor:pointer; padding:6px}
  .dr-close:hover{color:var(--tx)}
  .dr-body{padding:20px 24px; overflow-y:auto; flex:1}
  .dr-sec{font-size:11px; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:var(--tx2); margin:18px 0 10px; display:flex; align-items:center; gap:8px}
  .dr-sec::before{content:""; width:18px; height:2px; background:linear-gradient(90deg,var(--ac),transparent); border-radius:2px}
  .dr-desc{color:var(--tx2); font-size:14px}
  .chips{display:flex; gap:7px; flex-wrap:wrap}
  .chip{background:rgba(255,255,255,.07); border-radius:99px; padding:3.5px 12px; font-size:12px; color:var(--tx2); font-weight:550}
  .chip.cost{color:var(--gold)}
  .chip.alert{color:#ffab9d; background:rgba(255,107,94,.12)}
  .chip.st{font-family:'JetBrains Mono',monospace}
  .notes{
    font-size:12.5px; color:var(--tx2); padding:12px 14px; background:rgba(0,0,0,.3);
    border-radius:12px; white-space:pre-wrap; font-family:'JetBrains Mono',monospace;
    line-height:1.6; border:1px solid rgba(255,255,255,.05)
  }
  a.link{
    color:var(--ac2); text-decoration:none; font-size:13px; font-weight:600;
    background:rgba(109,141,255,.12); padding:8px 15px; border-radius:10px;
    border:1px solid rgba(109,141,255,.18); display:inline-block; transition:.15s
  }
  a.link:hover{background:rgba(109,141,255,.24)}
  .dr-foot{padding:16px 24px; border-top:1px solid var(--line); display:flex; gap:9px}
  .mini-list{display:flex; flex-direction:column; gap:6px}
  .mini-item{
    display:flex; align-items:center; gap:10px; background:var(--glass2); border:1px solid var(--line);
    padding:9px 13px; border-radius:11px; cursor:pointer; font-size:13.5px; font-weight:550; transition:.15s
  }
  .mini-item:hover{border-color:var(--ac)}
  .mini-item .mi-emoji{font-size:17px}
  .mini-item .arrow{margin-left:auto; color:var(--tx3)}

  .todo-item{display:flex; align-items:center; gap:11px; padding:9px 0; border-bottom:1px solid var(--line); font-size:13.5px}
  .todo-item:last-of-type{border:none}
  .todo-item .cb{width:18px;height:18px; border-radius:6px; border:1.5px solid var(--tx3); cursor:pointer; display:grid; place-items:center; font-size:11px; color:transparent; flex:none; transition:.15s}
  .todo-item.done .cb{background:linear-gradient(135deg,#7C4FF0,#9D6BFF); border-color:transparent; color:#fff}
  .todo-item.done span.t{color:var(--tx3); text-decoration:line-through}
  .todo-item .x{margin-left:auto; color:var(--tx3); cursor:pointer; opacity:.4}
  .todo-item .x:hover{color:var(--bad); opacity:1}
  .todo-item .td-ed{margin-left:auto; color:var(--tx3); cursor:pointer; opacity:.4; font-size:12px}
  .todo-item .td-ed:hover{color:var(--ac2); opacity:1}
  .tb{display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:600; padding:1px 7px; border-radius:99px; background:var(--glass2); border:1px solid var(--line2); color:var(--tx2); margin-left:5px; vertical-align:middle; white-space:nowrap}
  .tb.tb-alta{border-color:rgba(255,107,94,.5)} .tb.tb-media{border-color:rgba(245,165,36,.5)} .tb.tb-baixa{border-color:rgba(61,220,132,.4)}
  .tb.tb-over{background:rgba(255,107,94,.16); border-color:var(--bad); color:#ffb3aa}
  .td-in{background:rgba(0,0,0,.3); border:1px solid var(--line); border-radius:9px; color:var(--tx); padding:5px 9px; font-size:12px; font-family:inherit}
  .td-in:focus{outline:none; border-color:var(--ac)}
  .todo-add{display:flex; gap:8px; margin-top:10px}
  .todo-add input{flex:1; background:rgba(0,0,0,.3); border:1px solid var(--line); border-radius:10px; color:var(--tx); padding:8px 12px; font-size:13px; font-family:inherit}
  .todo-add input:focus{outline:none; border-color:var(--ac)}

  /* ===== chat ===== */
  .drawer.wide{width:560px}
  .chat-head{display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line)}
  .chat-head .back{background:transparent; border:none; color:var(--tx2); font-size:18px; cursor:pointer; padding:4px 8px; border-radius:8px}
  .chat-head .back:hover{background:var(--glass2); color:var(--tx)}
  .chat-head h3{font-size:15px; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .chat-head select{
    background:rgba(0,0,0,.35); border:1px solid var(--line); border-radius:9px; color:var(--tx);
    padding:5px 8px; font-size:12px; font-family:inherit; max-width:150px;
  }
  .chat-msgs{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px}
  .bub{max-width:86%; padding:11px 15px; border-radius:16px; font-size:14px; line-height:1.55; white-space:pre-wrap; word-break:break-word}
  .bub.user{align-self:flex-end; background:linear-gradient(135deg,#7C4FF0,#9D6BFF); color:#fff; border-bottom-right-radius:5px}
  .bub.ai{align-self:flex-start; background:var(--glass2); border:1px solid var(--line); border-bottom-left-radius:5px}
  .bub.err{align-self:center; background:rgba(255,107,94,.12); color:#ffab9d; font-size:12.5px; border-radius:10px}
  .bub .meta{display:block; font-size:10.5px; color:var(--tx3); margin-top:6px; font-family:'JetBrains Mono',monospace}
  .bub code{background:rgba(0,0,0,.35); padding:1px 6px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:12.5px}
  .bub pre{background:rgba(0,0,0,.4); padding:10px 12px; border-radius:10px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:12.5px; margin:6px 0}
  .ctxbar{padding:9px 16px; border-top:1px solid var(--line); display:flex; gap:6px; flex-wrap:wrap; align-items:center}
  .ctxbar .lbl{font-size:10.5px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; font-weight:650; margin-right:2px}
  .ctxchip{
    border-radius:99px; padding:3px 11px; font-size:11.5px; cursor:pointer; font-weight:600;
